<script>
// Paper filter
(function() {
  var pills = document.querySelectorAll('.filter-pill');
  var cards = document.querySelectorAll('.research-card');
  if (!pills.length) return;
  pills.forEach(function(pill) {
    pill.addEventListener('click', function() {
      pills.forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      var filter = pill.dataset.filter;
      cards.forEach(function(card) {
        var tags = (card.dataset.tags || '').toLowerCase();
        if (filter === 'all' || tags.indexOf(filter) !== -1) {
          card.classList.remove('research-card-hidden');
        } else {
          card.classList.add('research-card-hidden');
        }
      });
    });
  });
})();
</script>


<script>
// Cap news grid to 9 items via JS (CSS nth-child unreliable with rendered markdown structure)
(function() {
  var wrap = document.querySelector('.news-cards-capped');
  if (!wrap) return;
  var items = wrap.querySelectorAll('.timeline');
  for (var i = 9; i < items.length; i++) {
    items[i].style.display = 'none';
  }
})();

// Scroll-reveal section headers — skip headers already in the viewport on load
(function() {
  if (!window.IntersectionObserver) return;
  var headers = document.querySelectorAll('section h2');
  if (!headers.length) return;
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) {
        e.target.classList.add('section-revealed');
        obs.unobserve(e.target);
      }
    });
  }, { threshold: 0.15 });
  headers.forEach(function(h) {
    var rect = h.getBoundingClientRect();
    var alreadyVisible = rect.top >= 0 && rect.bottom <= window.innerHeight;
    if (!alreadyVisible) {
      h.classList.add('section-reveal');
      obs.observe(h);
    }
  });
})();
</script>
