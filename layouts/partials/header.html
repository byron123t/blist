<nav class="sticky top-0 z-40 py-0 bg-white border-b border-gray-100">
  <div class="max-w-screen-lg mx-auto w-full px-6 bg-white flex items-center" style="min-height:3.25rem">
    <a href="{{ .Site.Home.Permalink }}" class="transition-colors duration-150 font-mono text-sm font-semibold tracking-wide text-gray-900 hover:text-green-600">
      {{ if .Site.Params.logo }}
      <img src="{{ .Site.Params.logo }}" alt="{{ .Site.Title }}" class="h-6 max-w-full" />
      {{ else }}
      {{ .Site.Title | lower }}
      {{ end }}
    </a>
    <button onclick="window.openCmdPalette && window.openCmdPalette()" class="ml-auto font-mono text-xs px-2.5 py-1 rounded border border-gray-200 text-gray-400 hover:border-green-500 hover:text-green-600 transition-colors flex items-center gap-1.5" aria-label="Open command palette">
      <span>⌘K</span>
    </button>
    <ul class="flex flex-wrap items-center gap-4 lg:gap-6 ml-3">

      {{ range .Site.Menus.main }}
      <li><a class="font-mono text-xs tracking-wide transition-colors duration-150 text-gray-500 hover:text-green-600" href="{{ .URL | relLangURL }}">{{ .Name }}</a></li>
      {{ end }}

      {{ if .Site.Params.enableSearch }}
      <li class="grid place-items-center">
        <span class="open-search inline-block cursor-pointer text-gray-400 hover:text-green-600 transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" stroke-width="1.5"
            stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path stroke="none" d="M0 0h24v24H0z" fill="none" />
            <circle cx="10" cy="10" r="7" />
            <line x1="21" y1="21" x2="15" y2="15" />
          </svg>
        </span>
      </li>
      {{ end }}

    </ul>
  </div>
</nav>
