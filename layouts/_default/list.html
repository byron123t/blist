{{ define "main" }}

  <div class="bg-white border-b border-gray-100">
    <div class="max-w-screen-lg mx-auto px-6 py-10">
      <h1 class="text-xl font-bold tracking-tight text-gray-900">
        <span class="font-mono font-normal text-green-600 opacity-50 select-none" aria-hidden="true">// </span>{{ .Title }}
      </h1>
    </div>
  </div>

  <div class="max-w-screen-lg mx-auto px-6 py-10">
    <div class="filter-bar">
      <button class="filter-pill active" data-filter="all">all</button>
      <button class="filter-pill" data-filter="security">security</button>
      <button class="filter-pill" data-filter="privacy">privacy</button>
      <button class="filter-pill" data-filter="vlm">vlm</button>
      <button class="filter-pill" data-filter="nlp">nlp</button>
      <button class="filter-pill" data-filter="hci">hci</button>
      <button class="filter-pill" data-filter="agents">agents</button>
      <button class="filter-pill" data-filter="fairness">fairness</button>
    </div>
    {{ $paginator := .Paginate .Pages.ByDate.Reverse 100 }}
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      {{ range $paginator.Pages }}
      <div class="research-card rounded-lg overflow-hidden border border-gray-100 bg-gray-50 hover:-translate-y-0.5 transition-all duration-200 flex flex-col card-hover"
           data-tags="{{ range .Params.tags }}{{ . | lower }} {{ end }}">
        {{- partial "thumb-card.html" . -}}
        {{- partial "desc.html" . -}}
      </div>
      {{ end }}
    </div>
  </div>

  {{- partial "social.html" . -}}

{{ end }}
